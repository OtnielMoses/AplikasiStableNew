name: stable_app
description: STABLE Fitness App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  http: ^1.6.0
  image_picker: ^1.0.0
  shared_preferences: ^2.2.2
  intl: ^0.18.0
  cupertino_icons: ^1.0.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/splash.png
    - assets/icon/logo.png
    - assets/arm1.png
    - assets/chest1.png
    - assets/back1.png
    - assets/leg1.png
    - assets/arm2.png
    - assets/chest2.png
    - assets/back2.png
    - assets/leg2.png
    - assets/arm3.png
    - assets/chest3.png
    - assets/back.webp
    - assets/leg3.png
    - assets/pushday.jpg
    - assets/pullday.jpeg
    - assets/legday.webp
    - assets/fullbody.png
    - assets/hiit.png
    - assets/time.jpg

flutter_native_splash:
  color: "#b9f14e"
  image: assets/splash.png
  android: true
  ios: true
  fullscreen: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"